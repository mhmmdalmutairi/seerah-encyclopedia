<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اقترح كياناً — موسوعة السيرة النبوية المؤسسية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <style>
    body { background: #f5f1e8; color: #2a2a2a; padding: 2rem 1rem; font-family: "Tajawal","IBM Plex Sans Arabic",sans-serif; min-height: 100vh; }
    .suggest-page { max-width: 720px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 2rem; box-shadow: 0 4px 24px rgba(0,0,0,.06); }
    .suggest-page h1 { color: #0A4D68; font-size: 1.7rem; margin: 0 0 .5rem; }
    .suggest-page > p.intro { color: #555; line-height: 1.8; margin-bottom: 1.5rem; }
    .back-link { display: inline-block; margin-bottom: 1rem; color: #0A4D68; font-weight: 600; }
    .form-field { margin: 1rem 0; }
    .form-field label { display: block; font-weight: 600; color: #0A4D68; margin-bottom: .4rem; font-size: .95rem; }
    .form-field label .req { color: #C0392B; }
    .form-field input, .form-field textarea, .form-field select {
      width: 100%; padding: .7rem .9rem; border: 1px solid #e2dccc; border-radius: 6px;
      font-family: inherit; font-size: .95rem; background: #fdfbf5; min-height: 44px;
    }
    .form-field textarea { min-height: 100px; resize: vertical; line-height: 1.7; }
    .form-field input:focus, .form-field textarea:focus, .form-field select:focus {
      outline: 2px solid #C39B5C; outline-offset: 1px;
    }
    .form-field .hint { font-size: .85rem; color: #888; margin-top: .3rem; }
    .submit-row { margin-top: 1.5rem; display: flex; gap: .75rem; flex-wrap: wrap; }
    .btn-primary {
      background: #0A4D68; color: #fff; border: none; padding: .85rem 1.5rem;
      border-radius: 6px; font-family: inherit; font-size: 1rem; font-weight: 700;
      cursor: pointer; min-height: 48px;
    }
    .btn-primary:hover { background: #073A50; }
    .btn-secondary {
      background: transparent; color: #0A4D68; border: 1px solid #0A4D68;
      padding: .85rem 1.5rem; border-radius: 6px; font-family: inherit;
      font-size: 1rem; font-weight: 600; cursor: pointer; text-decoration: none;
      display: inline-flex; align-items: center; min-height: 48px;
    }
    .btn-secondary:hover { background: #0A4D68; color: #fff; }
    .success-msg {
      display: none; padding: 1rem; background: #2E7D32; color: #fff;
      border-radius: 6px; margin: 1rem 0;
    }
  </style>
</head>
<body>
  <div class="suggest-page">
    <a href="./" class="back-link">← العودة للموسوعة</a>

    <h1>📨 اقترح كياناً جديداً</h1>
    <p class="intro">
      هل تعرف مؤسسة تخدم السيرة النبوية وليست في الموسوعة؟ ساعدنا على رصدها. تُراجَع الاقتراحات وتُضاف بعد التحقّق.
    </p>

    <form id="suggest-form">
      <div class="form-field">
        <label>اسم الكيان بالعربية <span class="req">*</span></label>
        <input type="text" id="name_ar" required placeholder="مثلاً: معهد دراسات السيرة بطشقند">
      </div>

      <div class="form-field">
        <label>الاسم بالإنجليزية / الأصلية</label>
        <input type="text" id="name_en" placeholder="Tashkent Institute of Sira Studies">
      </div>

      <div class="form-field">
        <label>الدولة <span class="req">*</span></label>
        <input type="text" id="country" required placeholder="مثلاً: أوزبكستان (UZ)">
      </div>

      <div class="form-field">
        <label>نوع الكيان <span class="req">*</span></label>
        <select id="type" required>
          <option value="">— اختر —</option>
          <option value="university_center">مركز جامعي</option>
          <option value="research_center">مركز بحثي</option>
          <option value="foundation_waqf">مؤسسة/وقف</option>
          <option value="publisher">دار نشر</option>
          <option value="journal">مجلة محكّمة</option>
          <option value="library_archive">مكتبة/أرشيف</option>
          <option value="digital_platform">منصة رقمية</option>
          <option value="mobile_app">تطبيق جوّال</option>
          <option value="museum">متحف/معرض</option>
          <option value="mosque_program">برنامج مسجدي</option>
          <option value="islamic_center">مركز ثقافي إسلامي</option>
          <option value="award">جائزة</option>
          <option value="conference_series">مؤتمر دوري</option>
          <option value="individual_researcher">باحث/مفكّر فردي</option>
          <option value="other">آخر</option>
        </select>
      </div>

      <div class="form-field">
        <label>سنة التأسيس</label>
        <input type="number" id="founded" min="600" max="2026" placeholder="مثلاً: 2018">
      </div>

      <div class="form-field">
        <label>الرابط الرسمي / المصدر الموثّق <span class="req">*</span></label>
        <input type="url" id="url" required placeholder="https://example.com">
        <p class="hint">رابط رسمي للموقع، أو صفحة Wikipedia، أو مقال موثّق</p>
      </div>

      <div class="form-field">
        <label>وصف موجز (40-70 كلمة) <span class="req">*</span></label>
        <textarea id="description" required placeholder="ماذا تفعل هذه المؤسسة؟ ما حجمها؟ كيف تخدم السيرة النبوية تحديداً؟"></textarea>
      </div>

      <div class="form-field">
        <label>الشخصيات الرئيسة (إن وُجدت)</label>
        <input type="text" id="key_figures" placeholder="فصل بفواصل: د. محمد X، د. أحمد Y">
      </div>

      <div class="form-field">
        <label>اسمك (اختياري)</label>
        <input type="text" id="suggester" placeholder="من أجل الشكر، إن أردت">
      </div>

      <div class="submit-row">
        <button type="submit" class="btn-primary">📨 إرسال عبر GitHub Issue</button>
        <a href="./" class="btn-secondary">إلغاء</a>
      </div>
    </form>

    <div id="success-msg" class="success-msg">
      ✓ تم فتح صفحة GitHub في تبويب جديد — أكمل الإرسال هناك. شكراً!
    </div>
  </div>

  <script>
    document.getElementById('suggest-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const v = (id) => document.getElementById(id).value.trim();
      const name_ar = v('name_ar');
      const name_en = v('name_en');
      const country = v('country');
      const type = v('type');
      const founded = v('founded');
      const url = v('url');
      const description = v('description');
      const key_figures = v('key_figures');
      const suggester = v('suggester');

      const body = `## اقتراح كيان جديد

**الاسم بالعربية:** ${name_ar}
**الاسم بالإنجليزية:** ${name_en || '—'}
**الدولة:** ${country}
**النوع:** ${type}
**سنة التأسيس:** ${founded || '—'}
**الرابط الموثّق:** ${url}

### الوصف
${description}

### الشخصيات الرئيسة
${key_figures || '—'}

### اقترحه
${suggester || 'مجهول'}

---
*أُرسل عبر https://mhmmdalmutairi.github.io/seerah-encyclopedia/suggest.html*`;

      const title = `اقتراح كيان: ${name_ar}`;
      const githubUrl = `https://github.com/mhmmdalmutairi/seerah-encyclopedia/issues/new?title=${encodeURIComponent(title)}&body=${encodeURIComponent(body)}&labels=suggestion`;
      window.open(githubUrl, '_blank', 'noopener');
      document.getElementById('success-msg').style.display = 'block';
    });
  </script>
</body>
</html>
